    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #3f4766;
        overscroll-behavior-y: none;
      }

      body {
        overflow-x: hidden;
      }

      .home-shell {
        min-height: 100dvh;
        background: #3f4766;
        color: #fff;
        font-family: "Poppins", system-ui, sans-serif;
      }

      .home-shell__hero {
        position: relative;
        display: flex;
        min-height: 78dvh;
        align-items: flex-end;
        overflow: hidden;
      }

      .home-shell__media,
      .home-shell__shade {
        position: absolute;
        inset: 0;
      }

      .home-shell__media img {
        display: block;
        height: 100%;
        width: 100%;
        object-fit: cover;
      }

      .home-shell__shade {
        background: rgba(63, 71, 102, 0.56);
      }

      .home-shell__top {
        position: absolute;
        inset-inline: 0;
        top: max(12px, env(safe-area-inset-top));
        z-index: 2;
        padding: 0 16px;
      }

      .home-shell__top-inner {
        margin: 0 auto;
        display: flex;
        max-width: 1080px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .home-shell__logo {
        display: block;
        height: auto;
        width: min(148px, 34vw);
      }

      .home-shell__header-cta,
      .home-shell__primary,
      .home-shell__secondary {
        text-decoration: none;
      }

      .home-shell__header-cta {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: #f57c00;
        padding: 0 18px;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        box-shadow: 8px 8px 18px rgba(163, 82, 27, 0.45), -6px -6px 14px rgba(255, 175, 102, 0.16);
      }

      .home-shell__content {
        position: relative;
        z-index: 1;
        width: 100%;
        padding: 0 24px max(28px, env(safe-area-inset-bottom));
      }

      .home-shell__card {
        max-width: 540px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 28px;
        background: rgba(63, 71, 102, 0.62);
        padding: 28px 24px;
        box-shadow: 12px 12px 30px rgba(18, 24, 38, 0.45), -8px -8px 22px rgba(110, 126, 165, 0.14);
        backdrop-filter: blur(10px);
      }

      .home-shell__card h1 {
        margin: 0;
        font-size: clamp(2.1rem, 5vw, 3.8rem);
        line-height: 0.96;
      }

      .home-shell__card p {
        margin: 14px 0 0;
        max-width: 36rem;
        color: rgba(255, 255, 255, 0.84);
        font-size: 15px;
        line-height: 1.65;
      }

      @media (max-width: 640px) {
        .home-shell__top {
          padding: 0 12px;
        }

        .home-shell__top-inner {
          gap: 12px;
        }

        .home-shell__header-cta {
          min-height: 42px;
          padding: 0 14px;
          font-size: 12px;
        }

        .home-shell__content {
          padding: 0 16px max(22px, env(safe-area-inset-bottom));
        }

        .home-shell__card {
          padding: 22px 18px;
        }
      }

      @media print {
        @page {
          margin: 12mm;
        }

        html,
        body {
          overflow: visible !important;
          background: #fff !important;
        }

        p,
        li {
          orphans: 3;
          widows: 3;
        }

        section,
        article,
        table,
        tbody,
        tr,
        .card,
        .timeline-item,
        .experience-item,
        .print-avoid-break {
          break-inside: avoid-page;
          page-break-inside: avoid;
        }

        .right-column,
        .col-right,
        .column-right,
        [class*="right-column"],
        [class*="col-right"] {
          position: static !important;
          float: none !important;
          overflow: visible !important;
        }

        .right-column > *,
        .col-right > *,
        .column-right > *,
        [class*="right-column"] > *,
        [class*="col-right"] > * {
          break-inside: avoid-page;
          page-break-inside: avoid;
        }

        .page-break,
        .page-separator,
        .print-page-break,
        [class*="page-break"] {
          break-before: page;
          page-break-before: always;
          margin-top: 0 !important;
          clear: both !important;
        }

        [data-edit-step],
        [data-edit-step="experiences"] {
          display: none !important;
          visibility: hidden !important;
          position: static !important;
          pointer-events: none !important;
        }
      }
    </style>
