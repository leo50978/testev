    <title>Dominoes Lakay - Discussion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
      :root {
        --bg: #081117;
        --panel: #12212a;
        --panel-2: #101b22;
        --line: rgba(255, 255, 255, 0.08);
        --text: #eef5f8;
        --muted: #9ab0bb;
        --accent: #f57c00;
        --accent-2: #00a884;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Poppins", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(245, 124, 0, 0.12), transparent 34%),
          radial-gradient(circle at bottom left, rgba(0, 168, 132, 0.1), transparent 28%),
          var(--bg);
        color: var(--text);
      }

      body {
        overflow: hidden;
      }

      .layout {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .header {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 12px;
        background: rgba(18, 33, 42, 0.9);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(14px);
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
      }

      .brand {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand img {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      .subline {
        margin-top: 2px;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .retention-banner {
        margin: 12px auto 0;
        width: min(100%, 760px);
        padding: 10px 12px;
        border: 1px solid rgba(74, 118, 255, 0.22);
        border-radius: 14px;
        background: rgba(74, 118, 255, 0.08);
        color: #dbe6ff;
        font-size: 0.78rem;
        line-height: 1.45;
      }

      .feed {
        overflow-y: auto;
        padding: 16px 12px;
      }

      .feed::-webkit-scrollbar {
        width: 8px;
      }

      .feed::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .empty {
        width: min(100%, 420px);
        margin: 48px auto 0;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        text-align: center;
        background: rgba(18, 33, 42, 0.78);
        color: var(--muted);
      }

      .row {
        width: min(100%, 760px);
        margin: 0 auto 14px;
        display: flex;
      }

      .row.mine {
        justify-content: flex-end;
      }

      .row.other {
        justify-content: flex-start;
      }

      .bubble {
        width: min(100%, 640px);
        padding: 12px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(16, 27, 34, 0.9);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .row.mine .bubble {
        background: rgba(0, 168, 132, 0.14);
        border-color: rgba(0, 168, 132, 0.28);
      }

      .row.agent .bubble {
        background: rgba(74, 118, 255, 0.14);
        border-color: rgba(120, 156, 255, 0.3);
      }

      .author {
        margin: 0 0 8px;
        font-size: 0.76rem;
        font-weight: 600;
        color: #cddaff;
      }

      .text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.45;
        font-size: 0.96rem;
      }

      .media {
        margin-top: 10px;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #081117;
      }

      .media img,
      .media video {
        display: block;
        width: 100%;
        max-height: 360px;
        object-fit: cover;
      }

      .meta {
        margin-top: 8px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .footer {
        padding: 12px;
        border-top: 1px solid var(--line);
        background: rgba(18, 33, 42, 0.92);
        backdrop-filter: blur(14px);
      }

      .agent-link {
        width: min(100%, 760px);
        margin: 0 auto 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 1px solid rgba(245, 124, 0, 0.28);
        background: rgba(245, 124, 0, 0.14);
        color: #ffe7d3;
        border-radius: 16px;
        padding: 11px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .composer {
        width: min(100%, 760px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 10px;
        align-items: end;
      }

      .attach-btn,
      .send-btn {
        width: 48px;
        height: 48px;
        border: 0;
        border-radius: 16px;
        cursor: pointer;
      }

      .attach-btn {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }

      .send-btn {
        background: var(--accent);
        color: white;
      }

      .compose-box {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        padding: 10px 12px;
      }

      .compose-box textarea {
        width: 100%;
        min-height: 42px;
        max-height: 140px;
        resize: vertical;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      .compose-box textarea::placeholder {
        color: rgba(255, 255, 255, 0.42);
      }

      .file-preview {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
        font-size: 0.78rem;
        color: var(--muted);
      }

      .file-preview.visible {
        display: flex;
      }

      .file-preview button {
        border: 0;
        background: transparent;
        color: #ffb8b8;
        cursor: pointer;
      }

      .status {
        width: min(100%, 760px);
        margin: 8px auto 0;
        min-height: 18px;
        font-size: 0.75rem;
        color: var(--muted);
      }

      .status.error {
        color: #ffb0b0;
      }

      .status.success {
        color: #8ff0c6;
      }

      @media (max-width: 700px) {
        .composer {
          grid-template-columns: 44px minmax(0, 1fr) 44px;
        }

        .attach-btn,
        .send-btn {
          width: 44px;
          height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <header class="header">
        <button id="discussionBackBtn" class="icon-btn" type="button" aria-label="Retour">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="brand">
          <img src="./logo.png" alt="Dominoes Lakay" onerror="this.onerror=null;this.src='./does.png';" />
          <div>
            <h1 class="title">Canal Dominoes Lakay</h1>
            <div id="discussionLiveStatus" class="subline">Connexion au canal...</div>
          </div>
        </div>
      </header>

      <div class="retention-banner">
        Les messages du canal et du support sont supprimés automatiquement après 7 jours.
      </div>

      <section id="discussionMessages" class="feed" aria-live="polite" aria-label="Canal discussion">
        <div id="discussionEmptyState" class="empty">
          Aucun message pour le moment. Les publications de l'agent apparaitront ici.
        </div>
      </section>

      <footer class="footer">
        <button id="openAgentChatBtn" class="agent-link" type="button">
          <i class="fa-solid fa-headset"></i>
          Discuter avec un agent
        </button>
        <div class="status">Le canal public est en lecture seule pour les utilisateurs. Seul l'agent publie ici.</div>
      </footer>
    </main>

    <script type="module" src="./discussion.js"></script>
  </body>
</html>
